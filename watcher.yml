name: Disney Magazine Watcher 🦆

on:
  schedule:
    # Toutes les 12h (6h et 18h UTC = 8h et 20h Paris)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nécessaire pour commit le state.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run watcher
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check_magazines.py

      - name: Commit state if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update magazine state [skip ci]"
          git push
